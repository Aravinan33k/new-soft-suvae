<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none">
  <defs>
    <radialGradient id="f5bg" cx="45%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#191007"/>
      <stop offset="100%" stop-color="#0b0906"/>
    </radialGradient>
    <linearGradient id="f5flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD9A8"/>
      <stop offset="60%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#F9723C" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes f5Loop { to { stroke-dashoffset: -32; } }
      @keyframes f5Orbit { to { transform: rotate(360deg); } }
      @keyframes f5Rocket { 0%,100% { transform: translate(240px,200px) rotate(45deg) translateY(0); } 50% { transform: translate(240px,200px) rotate(45deg) translateY(-10px); } }
      @keyframes f5Flame { 0%,100% { transform: scaleY(1); opacity: 0.9; } 50% { transform: scaleY(1.35); opacity: 1; } }
      @keyframes f5Tick { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
      .f5-loop { stroke-dasharray: 8 6; animation: f5Loop 1.4s linear infinite; }
      .f5-orbit { transform-origin: 240px 200px; animation: f5Orbit 14s linear infinite; }
      .f5-rocket { animation: f5Rocket 2.4s ease-in-out infinite; }
      .f5-flame { transform-origin: 0px 26px; animation: f5Flame 0.5s ease-in-out infinite; }
      .f5-tick { animation: f5Tick 1.8s ease-in-out infinite; }
      .f5-tick:nth-of-type(2) { animation-delay: 0.3s; }
      .f5-tick:nth-of-type(3) { animation-delay: 0.6s; }
      @media (prefers-reduced-motion: reduce) {
        .f5-loop, .f5-orbit, .f5-rocket, .f5-flame, .f5-tick { animation: none; }
      }
    </style>
  </defs>
  <rect width="480" height="480" fill="url(#f5bg)"/>
  <!-- devops infinity loop, current flowing -->
  <path class="f5-loop" d="M150 340 C110 340 110 400 150 400 C185 400 195 370 240 370 C285 370 295 400 330 400 C370 400 370 340 330 340 C295 340 285 370 240 370 C195 370 185 340 150 340 Z"
        fill="none" stroke="#FF9E55" stroke-width="2" opacity="0.4"/>
  <!-- orbit, slowly spinning -->
  <ellipse class="f5-orbit" cx="240" cy="200" rx="140" ry="52" fill="none" stroke="#FF8A3D" stroke-width="1.2" stroke-dasharray="4 8" opacity="0.4"/>
  <!-- rocket, ascending to top-right, gently bobbing -->
  <g class="f5-rocket" transform="translate(240 200) rotate(45)">
    <path d="M0 -46 C18 -30 18 0 8 26 H-8 C-18 0 -18 -30 0 -46 Z"
          fill="rgba(255,138,61,0.08)" stroke="#FFC08A" stroke-width="2.4"/>
    <circle cx="0" cy="-16" r="8" fill="rgba(255,247,230,0.15)" stroke="#FFC08A" stroke-width="2"/>
    <path d="M-8 14 L-24 34 L-10 26 Z M8 14 L24 34 L10 26 Z" fill="rgba(255,138,61,0.12)" stroke="#FFC08A" stroke-width="2"/>
    <path class="f5-flame" d="M-7 26 C-4 46 4 46 7 26 Z" fill="url(#f5flame)"/>
  </g>
  <!-- pipeline stage ticks bottom -->
  <g fill="#FFC08A" opacity="0.8">
    <circle class="f5-tick" cx="150" cy="440" r="4"/><circle class="f5-tick" cx="240" cy="440" r="4"/><circle class="f5-tick" cx="330" cy="440" r="4"/>
  </g>
  <g stroke="#FF9E55" stroke-width="1.5" opacity="0.4">
    <path d="M154 440 H236 M244 440 H326"/>
  </g>
</svg>
