<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1526"/><stop offset="0.55" stop-color="#0a1020"/><stop offset="1" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9440"/><stop offset="1" stop-color="#f9436b"/>
    </linearGradient>
    <linearGradient id="down" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9436b" stop-opacity="0.45"/><stop offset="1" stop-color="#f9436b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.22" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.26"/><stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <!-- header -->
  <text x="56" y="78" font-family="Segoe UI, system-ui, sans-serif" font-size="30" font-weight="700" fill="#e8eefb">Operations Health</text>
  <text x="56" y="106" font-family="Segoe UI, system-ui, sans-serif" font-size="15" fill="#8ea0bd">Where the friction lives — before AI</text>
  <rect x="1020" y="52" width="204" height="40" rx="20" fill="#f9436b" fill-opacity="0.12" stroke="#f9436b" stroke-opacity="0.4"/>
  <circle cx="1044" cy="72" r="5" fill="#f9436b"/>
  <text x="1058" y="77" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ff9cb0">3 bottlenecks found</text>
  <!-- KPI row: struggling metrics -->
  <g font-family="Segoe UI, system-ui, sans-serif">
    <rect x="56" y="140" width="368" height="112" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="84" y="180" font-size="13" fill="#8ea0bd">Manual Hours / Week</text>
    <text x="84" y="222" font-size="34" font-weight="700" fill="#e8eefb">312h</text>
    <text x="196" y="222" font-size="14" font-weight="600" fill="#f9436b">▲ rising</text>
    <rect x="456" y="140" width="368" height="112" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="484" y="180" font-size="13" fill="#8ea0bd">Avg. Turnaround</text>
    <text x="484" y="222" font-size="34" font-weight="700" fill="#e8eefb">6.4 days</text>
    <text x="640" y="222" font-size="14" font-weight="600" fill="#f9436b">target 1 day</text>
    <rect x="856" y="140" width="368" height="112" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="884" y="180" font-size="13" fill="#8ea0bd">Error Rate</text>
    <text x="884" y="222" font-size="34" font-weight="700" fill="#e8eefb">7.8%</text>
    <text x="984" y="222" font-size="14" font-weight="600" fill="#f9436b">costly rework</text>
  </g>
  <!-- workflow with congested node -->
  <rect x="56" y="284" width="768" height="380" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="84" y="330" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#cbd5e1">Order-to-Invoice Flow</text>
  <g stroke="#8ea0bd" stroke-opacity="0.4" stroke-width="2">
    <line x1="188" y1="480" x2="300" y2="480"/>
    <line x1="416" y1="480" x2="528" y2="480"/>
    <line x1="644" y1="480" x2="720" y2="480"/>
  </g>
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="13" text-anchor="middle">
    <rect x="104" y="440" width="84" height="80" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="146" y="568" fill="#8ea0bd">Intake</text>
    <rect x="300" y="440" width="116" height="80" rx="14" fill="#f9436b" fill-opacity="0.16" stroke="#f9436b" stroke-opacity="0.7" stroke-width="2"/>
    <text x="358" y="486" fill="#ff9cb0" font-weight="700" font-size="15">QUEUE</text>
    <text x="358" y="568" fill="#ff9cb0" font-weight="600">Manual review · 4.1d</text>
    <rect x="528" y="440" width="116" height="80" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="586" y="568" fill="#8ea0bd">Approval</text>
    <rect x="720" y="440" width="84" height="80" rx="14" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="762" y="568" fill="#8ea0bd">Invoice</text>
  </g>
  <!-- piled-up dots at the bottleneck -->
  <g fill="#f9436b">
    <circle cx="238" cy="470" r="5" opacity="0.9"/><circle cx="256" cy="484" r="5" opacity="0.75"/>
    <circle cx="240" cy="496" r="5" opacity="0.6"/><circle cx="262" cy="466" r="5" opacity="0.5"/>
    <circle cx="272" cy="492" r="5" opacity="0.85"/>
  </g>
  <text x="84" y="628" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8ea0bd">78% of cycle time is spent waiting on one manual step</text>
  <!-- declining trend panel -->
  <rect x="856" y="284" width="368" height="380" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="884" y="330" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#cbd5e1">Team Capacity</text>
  <polyline points="884,400 948,412 1012,432 1076,470 1140,516 1196,568" stroke="#f9436b" stroke-width="3" stroke-linecap="round"/>
  <polygon points="884,400 948,412 1012,432 1076,470 1140,516 1196,568 1196,620 884,620" fill="url(#down)"/>
  <g stroke="#ffffff" stroke-opacity="0.06"><line x1="884" y1="452" x2="1196" y2="452"/><line x1="884" y1="536" x2="1196" y2="536"/></g>
  <text x="884" y="652" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8ea0bd">Backlog grows as volume scales</text>
</svg>
