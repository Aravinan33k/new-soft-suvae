<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1526"/><stop offset="0.55" stop-color="#0a1020"/><stop offset="1" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9440"/><stop offset="1" stop-color="#f9436b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.3"/><stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <text x="56" y="78" font-family="Segoe UI, system-ui, sans-serif" font-size="30" font-weight="700" fill="#e8eefb">Integration Hub</text>
  <text x="56" y="106" font-family="Segoe UI, system-ui, sans-serif" font-size="15" fill="#8ea0bd">AI embedded in the tools you already use</text>
  <rect x="1040" y="52" width="184" height="40" rx="20" fill="#2ed3b7" fill-opacity="0.12" stroke="#2ed3b7" stroke-opacity="0.45"/>
  <circle cx="1064" cy="72" r="5" fill="#2ed3b7"/>
  <text x="1078" y="77" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#7fe8d4">6 / 6 connected</text>
  <!-- connection lines from tools to the core -->
  <g stroke="#ff9440" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="6 8">
    <line x1="262" y1="250" x2="560" y2="404"/>
    <line x1="262" y1="430" x2="560" y2="430"/>
    <line x1="262" y1="606" x2="560" y2="456"/>
    <line x1="1018" y1="250" x2="720" y2="404"/>
    <line x1="1018" y1="430" x2="720" y2="430"/>
    <line x1="1018" y1="606" x2="720" y2="456"/>
  </g>
  <!-- travelling pulses -->
  <g fill="#ffb057">
    <circle cx="380" cy="311" r="5"/><circle cx="470" cy="430" r="5" opacity="0.8"/><circle cx="360" cy="556" r="5" opacity="0.7"/>
    <circle cx="900" cy="311" r="5" opacity="0.8"/><circle cx="820" cy="430" r="5"/><circle cx="930" cy="562" r="5" opacity="0.7"/>
  </g>
  <!-- AI core -->
  <circle cx="640" cy="430" r="112" fill="#ff8a3d" fill-opacity="0.07"/>
  <circle cx="640" cy="430" r="112" stroke="url(#acc)" stroke-opacity="0.65" stroke-width="2"/>
  <circle cx="640" cy="430" r="84" stroke="#ffffff" stroke-opacity="0.1" stroke-dasharray="3 9"/>
  <rect x="596" y="386" width="88" height="88" rx="24" fill="url(#acc)" opacity="0.92"/>
  <text x="640" y="422" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff">AI</text>
  <text x="640" y="446" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.85">CORE</text>
  <text x="640" y="576" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#8ea0bd">One brain · every system · zero rip-and-replace</text>
  <!-- left tool tiles -->
  <g font-family="Segoe UI, system-ui, sans-serif">
    <rect x="76" y="202" width="186" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="98" y="224" width="30" height="30" rx="9" fill="#4ea8ff" fill-opacity="0.8"/>
    <text x="144" y="240" font-size="15" font-weight="700" fill="#e8eefb">CRM</text>
    <text x="98" y="282" font-size="12" fill="#7fe8d4">● Connected · live sync</text>
    <rect x="76" y="382" width="186" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="98" y="404" width="30" height="30" rx="9" fill="#ffb057" fill-opacity="0.85"/>
    <text x="144" y="420" font-size="15" font-weight="700" fill="#e8eefb">ERP</text>
    <text x="98" y="462" font-size="12" fill="#7fe8d4">● Connected · 2-way</text>
    <rect x="76" y="558" width="186" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="98" y="580" width="30" height="30" rx="9" fill="#b57bff" fill-opacity="0.85"/>
    <text x="144" y="596" font-size="15" font-weight="700" fill="#e8eefb">Database</text>
    <text x="98" y="638" font-size="12" fill="#7fe8d4">● Connected · read/write</text>
  </g>
  <!-- right tool tiles -->
  <g font-family="Segoe UI, system-ui, sans-serif">
    <rect x="1018" y="202" width="186" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="1040" y="224" width="30" height="30" rx="9" fill="#2ed3b7" fill-opacity="0.85"/>
    <text x="1086" y="240" font-size="15" font-weight="700" fill="#e8eefb">Email</text>
    <text x="1040" y="282" font-size="12" fill="#7fe8d4">● Connected · triage on</text>
    <rect x="1018" y="382" width="186" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="1040" y="404" width="30" height="30" rx="9" fill="#f9436b" fill-opacity="0.85"/>
    <text x="1086" y="420" font-size="15" font-weight="700" fill="#e8eefb">Chat</text>
    <text x="1040" y="462" font-size="12" fill="#7fe8d4">● Connected · alerts</text>
    <rect x="1018" y="558" width="186" height="96" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="1040" y="580" width="30" height="30" rx="9" fill="#7fd4ff" fill-opacity="0.85"/>
    <text x="1086" y="596" font-size="15" font-weight="700" fill="#e8eefb">Storage</text>
    <text x="1040" y="638" font-size="12" fill="#7fe8d4">● Connected · indexed</text>
  </g>
  <!-- top status strip -->
  <rect x="76" y="140" width="1128" height="0" rx="0" fill="none"/>
</svg>
